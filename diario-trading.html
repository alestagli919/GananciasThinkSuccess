<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diario de Trading</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diario Trading">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
  :root{
    --bg: #0a0a0d;
    --panel: #131318;
    --panel-border: #232329;
    --gold: #e6b84d;
    --text: #f2f2f0;
    --muted: #6f6f78;
    --green: #4fce8a;
    --red: #f2685c;
    --cell: #17171c;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 28px 18px 60px;
    display:flex;
    justify-content:center;
  }
  .page{
    width: 100%;
    max-width: 480px;
  }
  @media (min-width: 900px){
    body{ padding: 48px 24px 80px; }
    .page{ max-width: 760px; }
    .month-title{ font-size: 32px; }
    .summary .total{ font-size: 46px; }
    .cell{ min-height: 90px; padding: 12px; }
    .cell .daynum{ font-size: 16px; }
    .cell .amount{ font-size: 15px; }
    .calendar{ padding: 28px 22px; }
    .summary{ padding: 28px 28px 22px; }
    #saveAllBtn{ max-width: 320px; cursor:pointer; }
    #exportBtn:hover{ background:#1c1c22; }
    #saveAllBtn:hover{ filter: brightness(1.08); }
  }
  .header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 22px;
    letter-spacing: 2px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--gold);
  }
  .eyebrow{
    font-size: 13px;
    font-weight: 600;
    color: #cfcfd4;
    letter-spacing: 3px;
  }
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 22px;
  }
  .nav button{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor:pointer;
  }
  .nav button:hover{ background:#1c1c22; }
  .month-title{ font-size: 26px; font-weight: 700; }

  .summary{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 22px 22px 18px;
    margin-bottom: 22px;
  }
  .summary .label{
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .summary .total{
    font-size: 38px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .total.pos{ color: var(--green); }
  .total.neg{ color: var(--red); }
  hr{
    border: none;
    border-top: 1px solid var(--panel-border);
    margin: 14px 0 16px;
  }
  .stats{
    display:flex;
    gap: 30px;
  }
  .stats .stat .label{ margin-bottom: 4px; }
  .stats .stat .value{ font-size: 20px; font-weight: 700; }
  .value.pos-text{ color: var(--green); }
  .value.neg-text{ color: var(--red); }

  .calendar{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 20px 14px;
  }
  .weekdays{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .cell{
    aspect-ratio: 1 / 1;
    background: var(--cell);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
    position:relative;
    min-height: 66px;
  }
  .cell:hover{ border-color:#3a3a42; }
  .cell.empty{
    background: transparent;
    border: none;
    cursor: default;
  }
  .cell.today{
    border-color: var(--gold);
  }
  .cell .daynum{
    font-size: 14px;
    color: var(--text);
  }
  .cell .amount{
    font-size: 13px;
    font-weight: 700;
    align-self:flex-end;
  }
  .amount.pos{ color: var(--green); }
  .amount.neg{ color: var(--red); }

  .hint{
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 18px;
  }

  /* modal */
  .overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 50;
  }
  .overlay.show{ display:flex; }
  .modal{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 22px;
    width: 100%;
    max-width: 320px;
  }
  .modal h3{
    margin: 0 0 16px;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .modal input{
    width: 100%;
    background: var(--cell);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 18px;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .modal input:focus{ outline: none; border-color: var(--gold); }
  .modal-actions{
    display:flex;
    gap: 10px;
  }
  .modal-actions button{
    flex:1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: var(--cell);
    color: var(--text);
    font-size: 14px;
    cursor:pointer;
  }
  .modal-actions button.save{
    background: var(--gold);
    color: #1a1608;
    border-color: var(--gold);
    font-weight: 700;
  }
  .modal-actions button.clear{
    color: var(--red);
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <span class="dot"></span>
    <span class="eyebrow">DIARIO DE TRADING</span>
  </div>

  <div class="nav">
    <button id="prevBtn">‹</button>
    <div class="month-title" id="monthTitle">Julio 2026</div>
    <button id="nextBtn">›</button>
  </div>

  <div class="summary">
    <div class="label">TOTAL DEL MES</div>
    <div class="total" id="totalAmount">€0</div>
    <hr>
    <div class="stats">
      <div class="stat">
        <div class="label">TOTAL € GANADOS</div>
        <div class="value pos-text" id="totalWon">€0</div>
      </div>
      <div class="stat">
        <div class="label">TOTAL € PERDIDOS</div>
        <div class="value neg-text" id="totalLost">€0</div>
      </div>
    </div>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="hint">Toca un día para añadir tu resultado</div>

  <button id="exportBtn" style="display:block;margin:18px auto 0;background:var(--panel);border:1px solid var(--panel-border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;cursor:pointer;">📊 Exportar a Excel</button>

  <div style="display:flex;gap:10px;max-width:400px;margin:14px auto 0;">
    <button id="backupExportBtn" style="flex:1;background:var(--panel);border:1px solid var(--panel-border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:13px;cursor:pointer;">⬆️ Copia de seguridad</button>
    <button id="backupImportBtn" style="flex:1;background:var(--panel);border:1px solid var(--panel-border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:13px;cursor:pointer;">⬇️ Restaurar copia</button>
  </div>
  <input type="file" id="backupFileInput" accept="application/json" style="display:none;">
  <div class="hint" style="margin-top:8px;">Usa esto para pasar tus datos entre el móvil y el PC</div>

  <button id="saveAllBtn" style="display:block;width:100%;max-width:400px;margin:14px auto 0;background:var(--gold);border:1px solid var(--gold);color:#1a1608;padding:14px 20px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h3 id="modalDay">DÍA 3 DE JULIO</h3>
      <input type="number" id="amountInput" placeholder="Introduce el resultado (€)" step="0.01">
      <div class="modal-actions">
        <button class="clear" id="clearBtn">Borrar</button>
        <button id="cancelBtn">Cancelar</button>
        <button class="save" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>

</div>

<script>
  const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const today0 = new Date();
  let currentYear = today0.getFullYear();
  let currentMonth = today0.getMonth();
  let activeDay = null;

  // in-memory cache: key "YYYY-M-D" -> number, mirrored to persistent storage
  const results = {};

  function monthKey(y,m){ return 'diario:' + y + '-' + m; }

  function loadMonth(y,m){
    try{
      const raw = localStorage.getItem(monthKey(y,m));
      const data = raw ? JSON.parse(raw) : {};
      Object.keys(results).forEach(k => {
        if(k.startsWith(y+'-'+m+'-')) delete results[k];
      });
      Object.keys(data).forEach(day => {
        results[getKey(y,m,day)] = data[day];
      });
    }catch(e){
      // no hay datos guardados todavía para este mes
    }
  }

  function saveMonth(y,m){
    const data = {};
    Object.keys(results).forEach(k => {
      if(k.startsWith(y+'-'+m+'-')){
        const day = k.split('-')[2];
        data[day] = results[k];
      }
    });
    try{
      localStorage.setItem(monthKey(y,m), JSON.stringify(data));
    }catch(e){
      console.warn('No se pudo guardar el diario en este dispositivo.', e);
    }
  }

  function allMonthKeys(){
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('diario:')) keys.push(k);
    }
    return keys;
  }

  function saveAllMonths(){
    const months = new Set();
    Object.keys(results).forEach(k => {
      const parts = k.split('-');
      months.add(parts[0] + '-' + parts[1]);
    });
    months.forEach(key => {
      const [y, m] = key.split('-').map(Number);
      saveMonth(y, m);
    });
  }

  function exportBackup(){
    const backup = {};
    allMonthKeys().forEach(key => {
      try{
        backup[key] = JSON.parse(localStorage.getItem(key) || '{}');
      }catch(e){
        // mes ilegible, se omite
      }
    });

    if(Object.keys(backup).length === 0){
      alert('Todavía no hay ningún resultado guardado para respaldar.');
      return;
    }

    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const fecha = new Date().toISOString().slice(0,10);
    a.download = 'diario-trading-backup-' + fecha + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importBackup(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const backup = JSON.parse(e.target.result);
        const keys = Object.keys(backup).filter(k => k.startsWith('diario:'));
        if(!keys.length){
          alert('Este archivo no parece ser una copia de seguridad válida.');
          return;
        }
        const overwrite = confirm('¿Quieres FUSIONAR estos datos con los actuales? Pulsa "Cancelar" para REEMPLAZAR todo en su lugar.');
        if(!overwrite){
          if(!confirm('Esto borrará todos tus datos actuales y los sustituirá por los del archivo. ¿Continuar?')){
            return;
          }
          allMonthKeys().forEach(k => localStorage.removeItem(k));
        }
        keys.forEach(key => {
          let data = backup[key];
          if(overwrite){
            try{
              const existing = JSON.parse(localStorage.getItem(key) || '{}');
              data = Object.assign({}, existing, data);
            }catch(err){ /* usa solo los nuevos si falla */ }
          }
          localStorage.setItem(key, JSON.stringify(data));
        });
        loadMonth(currentYear, currentMonth);
        render();
        alert('Copia de seguridad restaurada correctamente ✅');
      }catch(err){
        alert('No se pudo leer el archivo. Asegúrate de que sea un backup válido (.json).');
      }
    };
    reader.readAsText(file);
  }

  document.getElementById('backupExportBtn').addEventListener('click', exportBackup);
  document.getElementById('backupImportBtn').addEventListener('click', () => {
    document.getElementById('backupFileInput').click();
  });
  document.getElementById('backupFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file) importBackup(file);
    e.target.value = '';
  });

  const grid = document.getElementById('grid');
  const monthTitle = document.getElementById('monthTitle');
  const totalAmount = document.getElementById('totalAmount');
  const totalWon = document.getElementById('totalWon');
  const totalLost = document.getElementById('totalLost');
  const overlay = document.getElementById('overlay');
  const amountInput = document.getElementById('amountInput');
  const modalDay = document.getElementById('modalDay');

  function fmtEuro(n){
    const rounded = Math.round(n*100)/100;
    const sign = rounded > 0 ? '+' : '';
    return sign + '€' + rounded.toLocaleString('es-ES');
  }

  function getKey(y,m,d){ return y+'-'+m+'-'+d; }

  function render(){
    monthTitle.textContent = monthNames[currentMonth] + ' ' + currentYear;
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1);
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

    let firstWeekday = (firstDay.getDay() + 6) % 7; // 0=Mon...6=Sun

    let leadingBlanks = firstWeekday <= 4 ? firstWeekday : 0;

    for(let i=0;i<leadingBlanks;i++){
      const empty = document.createElement('div');
      empty.className = 'cell empty';
      grid.appendChild(empty);
    }

    for(let day=1; day<=daysInMonth; day++){
      const dateObj = new Date(currentYear, currentMonth, day);
      const wd = (dateObj.getDay()+6)%7; // 0=Mon..6=Sun
      if(wd === 5 || wd === 6){
        continue; // fin de semana, no se muestra
      }

      const cell = document.createElement('div');
      cell.className = 'cell';

      const today = new Date();
      const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===day;
      if(isToday) cell.classList.add('today');

      const num = document.createElement('div');
      num.className = 'daynum';
      num.textContent = day;
      cell.appendChild(num);

      const key = getKey(currentYear,currentMonth,day);
      if(results[key] !== undefined){
        const amt = document.createElement('div');
        amt.className = 'amount ' + (results[key] >= 0 ? 'pos':'neg');
        amt.textContent = fmtEuro(results[key]);
        cell.appendChild(amt);
      }

      cell.addEventListener('click', () => openModal(day));
      grid.appendChild(cell);
    }

    updateSummary();
  }

  function updateSummary(){
    const keys = Object.keys(results).filter(k => k.startsWith(currentYear+'-'+currentMonth+'-'));
    let total = 0, won = 0, lost = 0;
    keys.forEach(k => {
      const v = results[k];
      total += v;
      if(v > 0) won += v;
      else if(v < 0) lost += v;
    });
    totalAmount.textContent = fmtEuro(total).replace('+','');
    totalAmount.className = 'total ' + (total>0?'pos':total<0?'neg':'');
    totalWon.textContent = fmtEuro(won).replace('+','');
    totalLost.textContent = fmtEuro(lost).replace('+','');
  }

  function openModal(day){
    activeDay = day;
    const key = getKey(currentYear,currentMonth,day);
    modalDay.textContent = 'DÍA ' + day + ' DE ' + monthNames[currentMonth].toUpperCase();
    amountInput.value = results[key] !== undefined ? results[key] : '';
    overlay.classList.add('show');
    setTimeout(()=>amountInput.focus(), 50);
  }

  function closeModal(){
    overlay.classList.remove('show');
    activeDay = null;
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    const key = getKey(currentYear,currentMonth,activeDay);
    const val = parseFloat(amountInput.value);
    if(!isNaN(val)){
      results[key] = val;
    }
    closeModal();
    render();
    saveMonth(currentYear, currentMonth);
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    const key = getKey(currentYear,currentMonth,activeDay);
    delete results[key];
    closeModal();
    render();
    saveMonth(currentYear, currentMonth);
  });

  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentMonth--;
    if(currentMonth < 0){ currentMonth = 11; currentYear--; }
    loadMonth(currentYear, currentMonth);
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentMonth++;
    if(currentMonth > 11){ currentMonth = 0; currentYear++; }
    loadMonth(currentYear, currentMonth);
    render();
  });

  document.getElementById('exportBtn').addEventListener('click', exportXLSX);

  const saveAllBtn = document.getElementById('saveAllBtn');
  saveAllBtn.addEventListener('click', () => {
    saveAllMonths();
    const original = saveAllBtn.textContent;
    saveAllBtn.textContent = 'Guardado ✓';
    saveAllBtn.disabled = true;
    setTimeout(() => {
      saveAllBtn.textContent = original;
      saveAllBtn.disabled = false;
    }, 1200);
  });

  async function exportXLSX(){
    const keys = allMonthKeys();

    if(!keys.length){
      alert('Todavía no hay ningún resultado guardado.');
      return;
    }

    // Recolectar y ordenar todas las entradas cronológicamente
    const entries = [];
    keys.forEach(key => {
      const ym = key.split('diario:')[1];
      const [y, m] = ym.split('-').map(Number);
      try{
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        Object.keys(data).map(Number).forEach(day => {
          entries.push({ y, m, day, value: data[day] });
        });
      }catch(e){
        // mes ilegible, se omite
      }
    });
    entries.sort((a,b) => (a.y-b.y) || (a.m-b.m) || (a.day-b.day));

    const totalWonVal = entries.filter(e=>e.value>0).reduce((s,e)=>s+e.value,0);
    const totalLostVal = entries.filter(e=>e.value<0).reduce((s,e)=>s+e.value,0);
    const totalNetVal = totalWonVal + totalLostVal;

    const GOLD = 'FFE6B84D';
    const PANEL = 'FF131318';
    const CELL_DARK = 'FF17171C';
    const TEXT_LIGHT = 'FFF2F2F0';
    const GREEN = 'FF4FCE8A';
    const RED = 'FFF2685C';
    const DARK_TEXT = 'FF1A1608';

    const workbook = new ExcelJS.Workbook();
    workbook.creator = 'Diario de Trading';
    workbook.created = new Date();

    const sheet = workbook.addWorksheet('Diario Trading', {
      views: [{ showGridLines: false }]
    });

    sheet.columns = [
      { width: 4 },
      { width: 22 },
      { width: 22 },
      { width: 4 }
    ];

    // --- Encabezado tipo factura ---
    sheet.mergeCells('B2:C2');
    const titleCell = sheet.getCell('B2');
    titleCell.value = 'DIARIO DE TRADING';
    titleCell.font = { bold: true, size: 18, color: { argb: TEXT_LIGHT } };
    titleCell.alignment = { horizontal: 'left', vertical: 'middle' };
    sheet.getRow(2).height = 30;

    sheet.mergeCells('B3:C3');
    const subtitleCell = sheet.getCell('B3');
    const fechaGeneracion = new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'long', year:'numeric' });
    subtitleCell.value = 'Informe generado el ' + fechaGeneracion;
    subtitleCell.font = { italic: true, size: 10, color: { argb: 'FF9A9AA2' } };

    for(let r=2; r<=3; r++){
      for(let c=2; c<=3; c++){
        sheet.getCell(r,c).fill = { type:'pattern', pattern:'solid', fgColor:{argb: PANEL} };
      }
    }

    // --- Resumen tipo factura (totales destacados) ---
    const summaryStartRow = 5;
    sheet.mergeCells(`B${summaryStartRow}:C${summaryStartRow}`);
    const totalLabelCell = sheet.getCell(`B${summaryStartRow}`);
    totalLabelCell.value = 'RESULTADO NETO';
    totalLabelCell.font = { bold: true, size: 10, color: { argb: 'FF9A9AA2' } };
    totalLabelCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb: PANEL} };

    sheet.mergeCells(`B${summaryStartRow+1}:C${summaryStartRow+1}`);
    const totalValueCell = sheet.getCell(`B${summaryStartRow+1}`);
    totalValueCell.value = totalNetVal;
    totalValueCell.numFmt = '+#,##0.00 "€";-#,##0.00 "€"';
    totalValueCell.font = { bold: true, size: 22, color: { argb: totalNetVal >= 0 ? GREEN : RED } };
    totalValueCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb: PANEL} };
    sheet.getRow(summaryStartRow+1).height = 28;

    const wonCell = sheet.getCell(`B${summaryStartRow+3}`);
    wonCell.value = 'Ganado';
    wonCell.font = { size: 9, color: { argb: 'FF9A9AA2' } };
    const wonValCell = sheet.getCell(`B${summaryStartRow+4}`);
    wonValCell.value = totalWonVal;
    wonValCell.numFmt = '#,##0.00 "€"';
    wonValCell.font = { bold: true, size: 13, color: { argb: GREEN } };

    const lostCell = sheet.getCell(`C${summaryStartRow+3}`);
    lostCell.value = 'Perdido';
    lostCell.font = { size: 9, color: { argb: 'FF9A9AA2' } };
    const lostValCell = sheet.getCell(`C${summaryStartRow+4}`);
    lostValCell.value = totalLostVal;
    lostValCell.numFmt = '#,##0.00 "€"';
    lostValCell.font = { bold: true, size: 13, color: { argb: RED } };

    // --- Tabla de movimientos ---
    const tableHeaderRow = summaryStartRow + 6;
    sheet.getCell(`B${tableHeaderRow}`).value = 'FECHA';
    sheet.getCell(`C${tableHeaderRow}`).value = 'RESULTADO';
    ['B','C'].forEach(col => {
      const c = sheet.getCell(`${col}${tableHeaderRow}`);
      c.font = { bold: true, size: 11, color: { argb: DARK_TEXT } };
      c.fill = { type:'pattern', pattern:'solid', fgColor:{argb: GOLD} };
      c.alignment = { horizontal: col==='B' ? 'left':'right', vertical:'middle' };
      c.border = { top:{style:'thin',color:{argb:GOLD}}, bottom:{style:'thin',color:{argb:GOLD}} };
    });
    sheet.getRow(tableHeaderRow).height = 22;

    const monthNamesEs = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

    entries.forEach((entry, i) => {
      const rowIndex = tableHeaderRow + 1 + i;
      const dateCell = sheet.getCell(`B${rowIndex}`);
      dateCell.value = entry.day + ' de ' + monthNamesEs[entry.m] + ' de ' + entry.y;
      dateCell.font = { size: 11, color: { argb: TEXT_LIGHT } };
      dateCell.alignment = { horizontal: 'left' };

      const valCell = sheet.getCell(`C${rowIndex}`);
      valCell.value = entry.value;
      valCell.numFmt = '+#,##0.00 "€";-#,##0.00 "€"';
      valCell.font = { bold: true, size: 11, color: { argb: entry.value >= 0 ? GREEN : RED } };
      valCell.alignment = { horizontal: 'right' };

      const bg = i % 2 === 0 ? CELL_DARK : PANEL;
      [dateCell, valCell].forEach(c => {
        c.fill = { type:'pattern', pattern:'solid', fgColor:{argb: bg} };
        c.border = { bottom:{style:'thin',color:{argb:'FF232329'}} };
      });
    });

    // --- Fila de total final ---
    const totalRowIndex = tableHeaderRow + entries.length + 1;
    const totalLbl = sheet.getCell(`B${totalRowIndex}`);
    totalLbl.value = 'TOTAL';
    totalLbl.font = { bold: true, size: 12, color: { argb: DARK_TEXT } };
    totalLbl.fill = { type:'pattern', pattern:'solid', fgColor:{argb: GOLD} };

    const totalVal = sheet.getCell(`C${totalRowIndex}`);
    totalVal.value = totalNetVal;
    totalVal.numFmt = '+#,##0.00 "€";-#,##0.00 "€"';
    totalVal.font = { bold: true, size: 12, color: { argb: DARK_TEXT } };
    totalVal.fill = { type:'pattern', pattern:'solid', fgColor:{argb: GOLD} };
    totalVal.alignment = { horizontal: 'right' };

    // Fondo oscuro general de la hoja (para que se vea como la app)
    for(let r=1; r<=totalRowIndex+2; r++){
      for(let c=1; c<=4; c++){
        const cell = sheet.getCell(r,c);
        if(!cell.fill){
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb: 'FF0A0A0D'} };
        }
      }
    }

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'diario-trading.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  loadMonth(currentYear, currentMonth);
  render();

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
